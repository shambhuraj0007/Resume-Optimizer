<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shortlistAI</title>
    <style>
      :root {
        --bg-app: #020617;        /* Deep Slate */
        --bg-header: rgba(2, 6, 23, 0.95); /* Glassy Dark */
        --border-color: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #3b82f6;       
        --primary-hover: #2563eb; 
      }

      body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: var(--bg-app); 
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
        
        /* Flex Layout Strategy */
        display: flex;
        flex-direction: column;
      }
      
      /* --- Header --- */
      #extension-header {
        flex: 0 0 60px; /* Fixed height */
        background: var(--bg-header);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 50;
        backdrop-filter: blur(8px); /* Real glass effect */
      }

      .brand-group { display: flex; flex-direction: column; }
      .logo-text { font-weight: 700; font-size: 16px; color: white; letter-spacing: -0.5px; }
      .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 500; }

      /* --- Main Content (Iframe) --- */
      #frame-container {
        flex: 1; /* Fills remaining space */
        width: 100%;
        position: relative;
        background-color: var(--bg-app);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* --- Footer --- */
      #extension-footer {
        flex: 0 0 36px; /* Fixed height */
        background: var(--bg-header);
        border-top: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 50;
        backdrop-filter: blur(8px);
      }

      .footer-links {
        display: flex;
        gap: 16px;
      }

      .footer-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 11px;
        font-weight: 500;
        transition: color 0.2s ease;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .footer-link:hover {
        color: var(--primary);
      }

      /* Optional: Dot indicator for 'Live' links */
      .footer-link::before {
        content: '';
        display: block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background-color: var(--border-color);
        transition: background-color 0.2s;
      }
      
      .footer-link:hover::before {
        background-color: var(--primary);
      }

      .version-tag {
        font-size: 9px;
        font-family: 'Courier New', monospace;
        color: #475569; /* Slate 500 */
        opacity: 0.8;
      }
      /* --- Analyze Button --- */
     
    </style>
  </head>
  <body>
    
    <header id="extension-header">
      <div class="brand-group">
        <span class="logo-text">shortlistAI</span>
        <span class="logo-sub">Improve Your Interview Chances</span>
      </div>
      
    </header>

    <main id="frame-container">
      <iframe id="app-frame" src="https://shortlistai.cv/extension-mode" allow="clipboard-read; clipboard-write"></iframe>
    </main>

    <footer id="extension-footer">
      <div class="footer-links">
        <a href="https://shortlistai.cv/dashboard" target="_blank" class="footer-link">Dashboard</a>
        <a href="https://shortlistai.cv/pricing" target="_blank" class="footer-link">Upgrade</a>
      </div>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
